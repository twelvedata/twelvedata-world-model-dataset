# Symbols universe for the Twelve Data world-model dataset.
#
# "equities" is the primary trainable universe (~50 large-caps spread
# across sectors). "macro" are context rows joined onto every equity row
# via src/tdwm/enrich.py. Macro tickers are NOT rolled into trajectories
# as separate episodes by default.

equities:
  # Technology
  - AAPL
  - MSFT
  - NVDA
  - GOOGL
  - META
  - AMZN
  - AVGO
  - ORCL
  - ADBE
