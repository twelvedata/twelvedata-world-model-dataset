macro:
  # Broad market & vol
  - SPY        # S&P 500 ETF
  - QQQ        # Nasdaq 100 ETF
  - IWM        # Russell 2000 ETF
  - VIXY       # VIX proxy (ProShares VIX Short-Term Futures ETF)
  # Rates / bonds (ETF proxies are easier to fetch consistently)
  - TLT        # 20+ yr Treasury
  - IEF        # 7-10 yr Treasury
  - SHY        # 1-3 yr Treasury
  # FX / commodities proxies
  - UUP        # US Dollar index ETF (DXY proxy)
  - XAU/USD    # Gold (spot)
  - XBR/USD    # Brent crude (spot)
  # Sector ETFs (SPDR)
  - XLK        # Tech
  - XLF        # Financials
  - XLV        # Healthcare
  - XLY        # Consumer discretionary
  - XLP        # Consumer staples
  - XLE        # Energy
  - XLI        # Industrials
  - XLB        # Materials
  - XLRE       # Real estate
  - XLU        # Utilities
  - XLC        # Communication
