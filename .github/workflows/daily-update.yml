name: Daily dataset update

on:
  schedule:
    - cron: '0 6 * * 2-6'
  workflow_dispatch:
    inputs:
      symbols:
        description: "Comma-separated override (e.g. AAPL,MSFT)"
        required: false
      timeframes:
        description: "Comma-separated override (e.g. 1day,1h)"
        required: false
      splits:
        description: "Comma-separated splits to rebuild+push (default: test only on cron, all three on manual)"
        required: false

concurrency:
  group: daily-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: self-hosted
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false
          clean: false   # preserve .venv across runs

      - name: Mount persistent data dir + setup venv
        run: |
          rm -rf data
          ln -s /mnt/HC_Volume_105514388 data
          [ -d .venv ] || python3 -m venv .venv
          .venv/bin/pip install -q -r requirements.txt
          .venv/bin/pip install -q -e .

      - name: Run leakage validator (fast)
        run: .venv/bin/python scripts/validate_no_leakage.py

      - name: Daily update
        env:
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          INPUT_SYMBOLS: ${{ github.event.inputs.symbols }}
          INPUT_TIMEFRAMES: ${{ github.event.inputs.timeframes }}
        run: |
          EXTRA=""
          [ -n "$INPUT_SYMBOLS" ] && EXTRA="$EXTRA --symbols $INPUT_SYMBOLS"
          [ -n "$INPUT_TIMEFRAMES" ] && EXTRA="$EXTRA --timeframes $INPUT_TIMEFRAMES"
          .venv/bin/python scripts/update_daily.py $EXTRA

      - name: Integrity check (gates HF push)
        env:
          INPUT_SYMBOLS: ${{ github.event.inputs.symbols }}
          INPUT_TIMEFRAMES: ${{ github.event.inputs.timeframes }}
        run: |
          EXTRA=""
          [ -n "$INPUT_SYMBOLS" ] && EXTRA="$EXTRA --symbols $INPUT_SYMBOLS"
          [ -n "$INPUT_TIMEFRAMES" ] && EXTRA="$EXTRA --timeframes $INPUT_TIMEFRAMES"
          .venv/bin/python scripts/check_integrity.py $EXTRA

      - name: Build and push release
        if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          INPUT_SPLITS: ${{ github.event.inputs.splits }}
          EVENT_NAME: ${{ github.event_name }}
          # Disable HF's in-memory accelerated uploaders. xet and
          # hf_transfer buffer multi-GB chunks while hashing, which OOM-
          # kills (exit 137) the runner on the 6+ GB trajectories/1min
          # parquet. Plain multipart streams bytes off disk at ~constant
          # RAM. Trade: slightly slower upload, but actually finishes.
          HF_HUB_DISABLE_XET: "1"
          HF_HUB_ENABLE_HF_TRANSFER: "0"
        run: |
          # Cron runs only rebuild + push the `test` split (train ≤ 2023
          # and val = 2024 are immutable barring a corporate-action
          # restatement, which triggers a full per-symbol re-backfill in
          # update_daily.py). Manual dispatch with no override does a
          # full rebuild; pass `splits=test` for the cheap path.
          if [ -n "$INPUT_SPLITS" ]; then
            SPLITS_FLAG="--splits $INPUT_SPLITS"
          elif [ "$EVENT_NAME" = "schedule" ]; then
            SPLITS_FLAG="--splits test"
          else
            SPLITS_FLAG=""
          fi
          .venv/bin/python scripts/build_release.py $SPLITS_FLAG
