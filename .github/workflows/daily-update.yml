name: Daily dataset update

on:
  schedule:
    - cron: '0 6 * * 2-6'
  workflow_dispatch:
    inputs:
      symbols:
        description: "Comma-separated override (e.g. AAPL,MSFT)"
        required: false
      timeframes:
        description: "Comma-separated override (e.g. 1day,1h)"
        required: false

concurrency:
  group: daily-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: self-hosted
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false
          clean: false   # preserve .venv across runs

      - name: Mount persistent data dir + setup venv
        run: |
          rm -rf data
          ln -s /mnt/HC_Volume_105514388 data
          [ -d .venv ] || python3 -m venv .venv
          .venv/bin/pip install -q -r requirements.txt
          .venv/bin/pip install -q -e .

      - name: Run leakage validator (fast)
        run: .venv/bin/python scripts/validate_no_leakage.py

      - name: Daily update
        env:
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          INPUT_SYMBOLS: ${{ github.event.inputs.symbols }}
          INPUT_TIMEFRAMES: ${{ github.event.inputs.timeframes }}
        run: |
          EXTRA=""
          [ -n "$INPUT_SYMBOLS" ] && EXTRA="$EXTRA --symbols $INPUT_SYMBOLS"
          [ -n "$INPUT_TIMEFRAMES" ] && EXTRA="$EXTRA --timeframes $INPUT_TIMEFRAMES"
          .venv/bin/python scripts/update_daily.py $EXTRA

      - name: Build and push release
        if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: .venv/bin/python scripts/build_release.py

      - name: Commit & push state
        if: ${{ (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && success() }}
        run: |
          git config user.name "twelvedata-bot"
          git config user.email "bot@twelvedata.com"
          git add data/_state.json data/_corporate_actions.json 2>/dev/null || true
          if [ -n "$(git diff --cached --name-only)" ]; then
            git commit -m "chore: daily state $(date -u +'%Y-%m-%d')"
            git push
          fi
